  <circle cx="678" cy="494" r="15" fill="#2563EB"/>
  <text x="678" y="500" fill="white" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">3</text>
  <text x="707" y="485" fill="#3D342D" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Preview content appears immediately</text>
  <text x="707" y="513" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">The full checkout query starts alongside it.</text>

  <path d="M878 535V557" stroke="#86B99A" stroke-width="3" stroke-linecap="round"/>
  <path d="M870 550L878 558L886 550" stroke="#86B99A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

