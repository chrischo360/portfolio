  <text x="153" y="594" fill="white" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="750">The complete modal finally renders</text>
  <text x="153" y="622" fill="#D7CEC7" font-family="Inter, Arial, sans-serif" font-size="17">Content was blocked by checkout setup.</text>
  <text x="153" y="647" fill="#F8C8C8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Visible content and purchase state arrive together.</text>

