  <text x="153" y="462" fill="#3D342D" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">One full query prepares everything</text>
  <text x="153" y="490" fill="#6B625C" font-family="Inter, Arial, sans-serif" font-size="17">Eligibility + CMS content</text>
  <text x="153" y="516" fill="#B91C1C" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Purchase contract + payment intent</text>

