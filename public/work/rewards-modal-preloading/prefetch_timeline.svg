  <text x="707" y="588" fill="#3D342D" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700">Checkout state arrives</text>
  <text x="707" y="616" fill="#6B625C" font-family="Inter, Arial, sans-serif" font-size="17">Purchase contract + payment intent load</text>
  <text x="707" y="642" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Checkout controls fill in without blocking content.</text>

  <rect x="226" y="718" width="748" height="30" rx="15" fill="#F1EAE4"/>
  <text x="600" y="739" fill="#4E443C" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="middle">The customer sees content sooner, without creating purchase state before intent.</text>
