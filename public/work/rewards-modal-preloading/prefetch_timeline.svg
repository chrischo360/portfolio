<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="620" rx="36" fill="#FBF7F2"/>
  <text x="70" y="86" fill="#221A14" font-family="Inter, Arial" font-size="42" font-weight="850">Modal load: before vs. after</text>
  <text x="70" y="124" fill="#6B625C" font-family="Inter, Arial" font-size="22">Moving the work off the click made the modal feel instant.</text>

  <!-- BEFORE row -->
  <text x="70" y="215" fill="#B91C1C" font-family="Inter, Arial" font-size="27" font-weight="900">Before</text>
  <text x="70" y="248" fill="#6B625C" font-family="Inter, Arial" font-size="20">everything happens after the click</text>
  <rect x="300" y="188" width="120" height="54" rx="14" fill="#FFF9EC" stroke="#F2D8A7" stroke-width="2"/>
  <text x="360" y="221" fill="#B45309" font-family="Inter, Arial" font-size="19" font-weight="800" text-anchor="middle">click</text>
  <rect x="440" y="188" width="620" height="54" rx="14" fill="#FDE7E7" stroke="#F3B4B4" stroke-width="2"/>
  <text x="750" y="221" fill="#B91C1C" font-family="Inter, Arial" font-size="19" font-weight="800" text-anchor="middle">fetch data + load code + wait</text>
  <rect x="1080" y="188" width="70" height="54" rx="14" fill="#EAF6FF" stroke="#B8DFFF" stroke-width="2"/>
  <text x="1115" y="221" fill="#2563EB" font-family="Inter, Arial" font-size="18" font-weight="800" text-anchor="middle">show</text>
  <text x="1010" y="288" fill="#B91C1C" font-family="Inter, Arial" font-size="24" font-weight="900" text-anchor="end">≈ 3.8s</text>

  <!-- AFTER row -->
  <text x="70" y="400" fill="#047857" font-family="Inter, Arial" font-size="27" font-weight="900">After</text>
  <text x="70" y="433" fill="#6B625C" font-family="Inter, Arial" font-size="20">readiness prepared during idle time</text>
  <rect x="300" y="373" width="500" height="54" rx="14" fill="#E9F7EF" stroke="#B7E3C8" stroke-width="2"/>
  <text x="550" y="406" fill="#047857" font-family="Inter, Arial" font-size="19" font-weight="800" text-anchor="middle">idle: prefetch data + lazy-load code</text>
  <rect x="820" y="373" width="120" height="54" rx="14" fill="#FFF9EC" stroke="#F2D8A7" stroke-width="2"/>
  <text x="880" y="406" fill="#B45309" font-family="Inter, Arial" font-size="19" font-weight="800" text-anchor="middle">click</text>
  <rect x="960" y="373" width="190" height="54" rx="14" fill="#EAF6FF" stroke="#B8DFFF" stroke-width="2"/>
  <text x="1055" y="406" fill="#2563EB" font-family="Inter, Arial" font-size="18" font-weight="800" text-anchor="middle">render (warm)</text>
  <text x="1150" y="473" fill="#047857" font-family="Inter, Arial" font-size="24" font-weight="900" text-anchor="end">≈ 0.5s</text>

  <rect x="235" y="525" width="730" height="64" rx="18" fill="white" stroke="#EADFD4"/>
  <text x="600" y="558" fill="#221A14" font-family="Inter, Arial" font-size="21" font-weight="800" text-anchor="middle">Same result at the click — but the expensive work already happened.</text>
  <text x="600" y="582" fill="#6B625C" font-family="Inter, Arial" font-size="18" text-anchor="middle">Purchase creation still waits for the user to confirm.</text>
</svg>
