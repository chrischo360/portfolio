<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="320" fill="#f8fafc"/>
  <text x="24" y="30" fill="#1f2a44" font-size="15" font-weight="700">From one monolith to federated subgraphs</text>

  <!-- BEFORE -->
  <text x="24" y="60" fill="#dc2626" font-size="12" font-weight="700">Before</text>
  <rect x="24" y="70" width="250" height="210" rx="10" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="149" y="92" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="700">PHP monolith</text>
  <rect x="44" y="105" width="210" height="30" rx="6" fill="#ffffff" stroke="#fca5a5"/>
  <text x="149" y="125" text-anchor="middle" fill="#7f1d1d" font-size="11">checkout logic</text>
  <rect x="44" y="142" width="210" height="30" rx="6" fill="#ffffff" stroke="#fca5a5"/>
  <text x="149" y="162" text-anchor="middle" fill="#7f1d1d" font-size="11">loyalty / enrollment</text>
  <rect x="44" y="179" width="210" height="30" rx="6" fill="#ffffff" stroke="#fca5a5"/>
  <text x="149" y="199" text-anchor="middle" fill="#7f1d1d" font-size="11">pricing + financials</text>
  <rect x="44" y="216" width="210" height="30" rx="6" fill="#ffffff" stroke="#fca5a5"/>
  <text x="149" y="236" text-anchor="middle" fill="#7f1d1d" font-size="11">cart / basket</text>
  <text x="149" y="268" text-anchor="middle" fill="#b91c1c" font-size="10">change one thing, risk all of it</text>

  <!-- arrow -->
  <line x1="284" y1="175" x2="330" y2="175" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- AFTER -->
  <text x="345" y="60" fill="#059669" font-size="12" font-weight="700">After</text>
  <rect x="345" y="70" width="270" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="480" y="92" text-anchor="middle" fill="#3730a3" font-size="12" font-weight="700">GraphQL gateway (one graph)</text>

  <rect x="345" y="120" width="270" height="34" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="480" y="142" text-anchor="middle" fill="#065f46" font-size="11">loyalty membership subgraph</text>
  <rect x="345" y="162" width="270" height="34" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="480" y="184" text-anchor="middle" fill="#065f46" font-size="11">order financials subgraph</text>
  <rect x="345" y="204" width="270" height="34" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="480" y="226" text-anchor="middle" fill="#065f46" font-size="11">cart / basket subgraph</text>
  <text x="480" y="262" text-anchor="middle" fill="#059669" font-size="10">each domain owns + evolves its slice</text>

  <line x1="480" y1="104" x2="480" y2="118" stroke="#94a3b8" stroke-width="1.5"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
