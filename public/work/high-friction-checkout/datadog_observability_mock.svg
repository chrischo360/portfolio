  <text x="100" y="430" fill="#FFFFFF" font-family="Inter, Arial" font-size="24" font-weight="850">Production safety checks</text>
  <text x="100" y="480" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">• Alert if checkout errors spike</text>
  <text x="470" y="480" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">• Watch payment failures</text>
  <text x="780" y="480" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">• Track latency regressions</text>
  <text x="100" y="525" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">• Log missing schema variants</text>
  <text x="470" y="525" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">• Disable veil on failure</text>
  <text x="780" y="525" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">• Keep checkout recoverable</text>
