  <text x="100" y="270" fill="#22C55E" font-family="Inter, Arial" font-size="54" font-weight="900">low</text>
  <path d="M100 305 C140 275 170 318 210 288 C250 258 285 310 350 274" stroke="#22C55E" stroke-width="5" fill="none" stroke-linecap="round"/>
  <rect x="440" y="165" width="320" height="170" rx="22" fill="#1C1C1C" stroke="#333"/>
  <text x="470" y="210" fill="#A3A3A3" font-family="Inter, Arial" font-size="18" font-weight="800">payment failures</text>
  <text x="470" y="270" fill="#22C55E" font-family="Inter, Arial" font-size="54" font-weight="900">stable</text>
  <path d="M470 305 C520 300 540 286 585 292 C640 299 675 280 720 288" stroke="#22C55E" stroke-width="5" fill="none" stroke-linecap="round"/>
