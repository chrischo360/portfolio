<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="640" rx="36" fill="#111111"/>
  <text x="70" y="82" fill="#FFFFFF" font-family="Inter, Arial" font-size="40" font-weight="850">Checkout safety dashboard</text>
  <text x="70" y="120" fill="#A3A3A3" font-family="Inter, Arial" font-size="22">Representative Datadog view: errors, payment failures, and latency watched during rollout.</text>
  <rect x="70" y="165" width="320" height="170" rx="22" fill="#1C1C1C" stroke="#333"/>
