<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="300" fill="#f8fafc"/>
  <text x="24" y="32" fill="#1f2a44" font-size="16" font-weight="700">Checkout latency: a year-long climb, then a drop</text>
  <!-- axes -->
  <line x1="60" y1="240" x2="600" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="60" y1="60" x2="60" y2="240" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="14" y="70" fill="#94a3b8" font-size="10">slow</text>
  <text x="18" y="238" fill="#94a3b8" font-size="10">fast</text>
  <!-- rising line (regression) -->
  <polyline points="70,190 160,178 250,160 340,140 430,120 500,108" fill="none" stroke="#dc2626" stroke-width="3"/>
  <!-- fix drop -->
  <polyline points="500,108 520,150 540,182 560,196" fill="none" stroke="#059669" stroke-width="3"/>
  <circle cx="500" cy="108" r="4" fill="#dc2626"/>
  <circle cx="560" cy="196" r="4" fill="#059669"/>
  <text x="330" y="105" fill="#dc2626" font-size="11">creeps up over ~9 months</text>
  <text x="440" y="230" fill="#059669" font-size="11" text-anchor="middle">phased fix</text>
  <!-- annotations -->
  <rect x="470" y="252" width="130" height="30" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="535" y="271" text-anchor="middle" fill="#065f46" font-size="12" font-weight="700">P75 −43%</text>
  <text x="70" y="262" fill="#94a3b8" font-size="10">time →</text>
</svg>
