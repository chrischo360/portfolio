<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="300" fill="#f8fafc"/>
  <text x="24" y="32" fill="#1f2a44" font-size="16" font-weight="700">Where server-side time went</text>

  <!-- Before bar -->
  <text x="40" y="90" fill="#475569" font-size="13" font-weight="600">Before</text>
  <rect x="120" y="72" width="180" height="28" fill="#dc2626"/>
  <rect x="300" y="72" width="230" height="28" fill="#cbd5e1"/>
  <text x="210" y="91" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">flag service ~1/3</text>
  <text x="415" y="91" text-anchor="middle" fill="#475569" font-size="11">other work</text>

  <!-- After bar -->
  <text x="40" y="160" fill="#475569" font-size="13" font-weight="600">After</text>
  <rect x="120" y="142" width="55" height="28" fill="#059669"/>
  <rect x="175" y="142" width="230" height="28" fill="#cbd5e1"/>
  <text x="147" y="161" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">flags</text>
  <text x="290" y="161" text-anchor="middle" fill="#475569" font-size="11">other work</text>

  <text x="120" y="215" fill="#64748b" font-size="12">Stale flags (concluded tests, fully-launched features) were removed;</text>
  <text x="120" y="235" fill="#64748b" font-size="12">only real kill switches were kept. P75 latency fell 43%.</text>
</svg>
