<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="Inter, Arial, sans-serif">
  <rect width="640" height="300" fill="#f8fafc"/>
  <text x="24" y="34" fill="#1f2a44" font-size="16" font-weight="700">Relational data model</text>

  <!-- users -->
  <rect x="24" y="70" width="150" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="24" y="70" width="150" height="26" rx="8" fill="#1f2a44"/>
  <text x="99" y="88" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">users</text>
  <text x="36" y="116" fill="#475569" font-size="11">id, role</text>
  <text x="36" y="134" fill="#475569" font-size="11">name, email</text>

  <!-- mentors -->
  <rect x="245" y="70" width="150" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="245" y="70" width="150" height="26" rx="8" fill="#4f46e5"/>
  <text x="320" y="88" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">mentors</text>
  <text x="257" y="116" fill="#475569" font-size="11">user_id →</text>
  <text x="257" y="134" fill="#475569" font-size="11">school, topics</text>

  <!-- availability -->
  <rect x="245" y="185" width="150" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="245" y="185" width="150" height="26" rx="8" fill="#059669"/>
  <text x="320" y="203" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">availability</text>
  <text x="257" y="231" fill="#475569" font-size="11">mentor_id →</text>
  <text x="257" y="249" fill="#475569" font-size="11">slots (from cal)</text>

  <!-- bookings -->
  <rect x="466" y="127" width="150" height="90" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="466" y="127" width="150" height="26" rx="8" fill="#d97706"/>
  <text x="541" y="145" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">bookings</text>
  <text x="478" y="173" fill="#475569" font-size="11">mentor_id →</text>
  <text x="478" y="191" fill="#475569" font-size="11">student_id →</text>
  <text x="478" y="209" fill="#475569" font-size="11">slot, status</text>

  <line x1="174" y1="115" x2="243" y2="115" stroke="#94a3b8" stroke-width="2"/>
  <line x1="320" y1="160" x2="320" y2="183" stroke="#94a3b8" stroke-width="2"/>
  <line x1="395" y1="230" x2="466" y2="185" stroke="#94a3b8" stroke-width="2"/>
  <line x1="395" y1="115" x2="466" y2="150" stroke="#94a3b8" stroke-width="2"/>
</svg>
