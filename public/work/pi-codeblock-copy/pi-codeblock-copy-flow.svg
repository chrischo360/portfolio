<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Inter, Arial, sans-serif">
  <rect width="900" height="420" fill="#f8fafc"/>
  <text x="36" y="42" fill="#1f2a44" font-size="20" font-weight="800">Before vs. after: copying from terminal output</text>
  <rect x="46" y="84" width="360" height="250" rx="18" fill="#fffefa" stroke="#d8ded8"/>
  <text x="76" y="124" fill="#991b1b" font-size="18" font-weight="800">Before: manual selection</text>
  <rect x="76" y="152" width="270" height="48" rx="10" fill="#fee2e2"/>
  <text x="96" y="182" fill="#7f1d1d" font-size="15" font-weight="700">enter tmux copy-mode</text>
  <path d="M211 204v28" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <path d="M201 224l10 10 10-10" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="76" y="236" width="270" height="48" rx="10" fill="#fee2e2"/>
  <text x="96" y="266" fill="#7f1d1d" font-size="15" font-weight="700">select wrapped terminal text</text>
  <path d="M211 288v28" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <path d="M201 308l10 10 10-10" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="76" y="326" fill="#991b1b" font-size="14">Risk: prompt text, prose, broken lines</text>
  <rect x="494" y="84" width="360" height="250" rx="18" fill="#fffefa" stroke="#d8ded8"/>
  <text x="524" y="124" fill="#065f46" font-size="18" font-weight="800">After: structured action</text>
  <rect x="524" y="152" width="270" height="48" rx="10" fill="#dcfce7"/>
  <text x="544" y="182" fill="#065f46" font-size="15" font-weight="700">parse fenced blocks</text>
  <path d="M659 204v28" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <path d="M649 224l10 10 10-10" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="524" y="236" width="270" height="48" rx="10" fill="#dcfce7"/>
  <text x="544" y="266" fill="#065f46" font-size="15" font-weight="700">/cc 2 copies exact block</text>
  <path d="M659 288v28" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <path d="M649 308l10 10 10-10" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="524" y="326" fill="#065f46" font-size="14">Result: no prompt text, no manual highlighting</text>
  <rect x="198" y="360" width="504" height="34" rx="17" fill="#e2e8f0"/>
  <text x="450" y="382" text-anchor="middle" fill="#475569" font-size="15" font-weight="700">Copy from the parsed message, not terminal pixels</text>
</svg>
