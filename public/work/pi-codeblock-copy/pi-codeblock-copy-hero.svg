<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, Arial, sans-serif">
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="70" y="54" width="1060" height="612" rx="28" fill="#fffefa" stroke="#d8ded8" stroke-width="2"/>
  <rect x="104" y="92" width="992" height="390" rx="18" fill="#101418"/>
  <text x="136" y="138" fill="#94a3b8" font-size="20" font-weight="700">assistant</text>
  <text x="136" y="184" fill="#e5e7eb" font-size="24">Here are the commands and config updates:</text>
  <rect x="136" y="220" width="410" height="94" rx="12" fill="#17202a" stroke="#334155"/>
  <text x="158" y="254" fill="#38bdf8" font-size="17" font-weight="700">```bash</text>
  <text x="158" y="286" fill="#e2e8f0" font-size="20">yarn install &amp;&amp; yarn typecheck</text>
  <rect x="136" y="336" width="620" height="106" rx="12" fill="#17202a" stroke="#334155"/>
  <text x="158" y="370" fill="#818cf8" font-size="17" font-weight="700">```ts</text>
  <text x="158" y="402" fill="#e2e8f0" font-size="20">export const COMMANDS = ["cc", "copy-code"];</text>
  <rect x="104" y="512" width="992" height="104" rx="18" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="136" y="548" fill="#0f172a" font-size="20" font-weight="800">/cc [n]</text>
  <g font-size="18" font-weight="700">
    <rect x="136" y="570" width="236" height="28" rx="14" fill="#e0f2fe"/>
    <text x="154" y="590" fill="#0369a1">[1] .sh yarn install...</text>
    <rect x="394" y="570" width="348" height="28" rx="14" fill="#ede9fe"/>
    <text x="412" y="590" fill="#5b21b6">[2] .ts export const COMMANDS...</text>
  </g>
  <rect x="806" y="550" width="234" height="50" rx="25" fill="#111827"/>
  <text x="923" y="582" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="800">/cc 2 → copied</text>
  <text x="600" y="646" text-anchor="middle" fill="#64748b" font-size="18">Structured copy actions for terminal AI code blocks</text>
